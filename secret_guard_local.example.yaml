# secret-guard:allow-pattern-literals
#
# Private, gitignored leak patterns for the CI secret guard.
#
# Copy this file to `secret_guard_local.yaml` (which is gitignored) and add the real
# proprietary tells there — codenames, schema names — that must NEVER appear in this
# public-bound repo. Keep the list LEAN and DO NOT annotate what each pattern refers to;
# the list of "words that would reveal the IP" is itself a little sensitive.
#
# Each entry is a Python regular expression. The guard fails the build if any matches a
# tracked (non-gitignored) file. The real file is loaded automatically when present; when
# absent (CI / fresh clone), the guard prints a loud notice and runs generic patterns only.

extra_disallowed_patterns:
  - "INTERNAL_CODENAME_1"     # placeholder — replace privately in secret_guard_local.yaml
  - "INTERNAL_SCHEMA_NAME"    # placeholder — replace privately in secret_guard_local.yaml
